<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style4.css') }}">
</head>
<body>
    
    <div class="container-fluid">
        <div style="background-color:#FECD0B; height:15px;"></div>

        <div class="container" style="padding: 30px 20px; text-align: center;">
            <div class="logo">
                <a href="#">
                    <img src="{{ url_for('static', filename='images/logo-2.png') }}" alt="logo" />
                </a>
            </div>
        </div>

        <div style="background-color:#FECD0B; height:15px;"></div>
    </div>

    <!-- Corrected div structure -->
    <div class="login-container">
        <h1>User Registration</h1>
        <form method="POST" action="{{ url_for('register') }}">
            <label for="fullname">Full Name</label>
            <input type="text" placeholder="Full Name" name="username" required>

            <label for="email">Email</label>
            <input type="email" placeholder="Email" name="email" required>

            <label for="password">Password</label>
            <input type="password" placeholder="Password" name="password" required>

            <label for="confirm_password">Confirm Password</label>
            <input type="password" placeholder="Confirm Password" name="confirm_password" required>

            <label style="margin-bottom: 5px"name="year">Year</label>
            <select style="margin-bottom: 5px"name="year" required>
                {% for year in years_table %}
                    <option value="{{ year['year'] }}">{{ year['year'] }}</option>
                {% endfor %}
            </select>
            
            <label style="margin-bottom: 5px"for="subjects">Subject you can teach:</label>
            <select style="margin-bottom: 5px"name="subjects" required>
                {% for subject in subjects_table %}
                    <option value="{{ subject['subject'] }}">{{ subject['subject'] }}</option>
                {% endfor %}
            </select>
            
            <!-- <small>Hold Ctrl (or Cmd) to select multiple</small> -->
            
            <button type="submit">Register</button>
        
            <p class="login-text">Already have an account? <a href="{{ url_for('home') }}">Login here</a></p>
        </form>
    </div>
    
</body>
</html>
